name: CI Kanban

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation dépendances
        run: npm install

      - name: Exécution des tests
        run: npm test

      - name: Build Docker
        run: docker build -t kanban-backend .